<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Gabon Tourism</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🇬🇦 Gabon Tourism</h1>
                <p class="subtitle">Ogooué-Maritime Province</p>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="sites.html">Tourist Sites</a></li>
                <li><a href="hotels.html">Hotels</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="guides.html">Tour Guides</a></li>
                <li><a href="favorites.html">❤️ Favorites</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="admin-login.html" class="admin-link">Admin</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="form-container" style="margin-top: 2rem;">
        <h1 class="section-title">Contact Us</h1>
        <p style="margin-bottom: 2rem; color: var(--text-light);">
            Have a question or need more information? Send us a message!
        </p>

        <form id="contact-form">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>

            <div id="form-message" style="margin-top: 1rem;"></div>
        </form>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Tourism Promotion Platform - Ogooué-Maritime Province, Gabon</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
