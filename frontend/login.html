<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gabon Tourism</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🇬🇦 Gabon Tourism</h1>
                <p class="subtitle">Ogooué-Maritime Province</p>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="sites.html">Tourist Sites</a></li>
                <li><a href="hotels.html">Hotels</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="guides.html">Tour Guides</a></li>
                <li><a href="favorites.html">❤️ Favorites</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="nav-user-area"></li>
                <li><a href="admin-login.html" class="admin-link">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="form-container" style="margin-top: 4rem;">
        <h1 class="section-title">Login</h1>
        <p style="margin-bottom: 2rem; color: var(--text-light);">
            Log in to manage your bookings.
        </p>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>

            <div id="login-message" style="margin-top: 1rem;"></div>
        </form>

        <p style="margin-top: 1.5rem; text-align: center; color: var(--text-light);">
            Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register here</a>
        </p>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Tourism Promotion Platform - Ogooué-Maritime Province, Gabon</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/user-auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
