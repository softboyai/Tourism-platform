    <link rel="stylesheet" href="css/styles.css">

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🇬🇦 Gabon Tourism</h1>
                <p class="subtitle">Ogooué-Maritime Province</p>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="sites.html">Tourist Sites</a></li>

    <!-- Main Content -->
    <div class="container" style="margin-top: 2rem;">
        <h1 class="section-title">Upcoming Events</h1>
        <div class="sites-grid" id="events-container">
            <p class="loading">Loading events...</p>
        </div>

    <!-- Booking Modal -->
    <div id="booking-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:12px; padding:2rem; max-width:480px; width:90%; max-height:80vh; overflow-y:auto; position:relative;">
            <button onclick="closeBookingModal()" style="position:absolute; top:1rem; right:1rem; background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
            <div id="booking-modal-body"></div>
        </div>
