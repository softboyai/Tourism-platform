<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Gabon Tourism</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="form-container" style="margin-top: 4rem;">
        <h1 class="section-title">Admin Login</h1>
        <p style="margin-bottom: 2rem; color: var(--text-light);">
            Tourism Platform - Admin Dashboard
        </p>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>

            <div id="login-message" style="margin-top: 1rem;"></div>
        </form>

        <p style="margin-top: 2rem; text-align: center;">
            <a href="index.html" style="color: var(--primary-color);">← Back to Website</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin-login.js"></script>
</body>
</html>
