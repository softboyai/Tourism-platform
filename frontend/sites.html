<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Sites - Gabon Tourism</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🇬🇦 Gabon Tourism</h1>
                <p class="subtitle">Ogooué-Maritime Province</p>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="sites.html" class="active">Tourist Sites</a></li>
                <li><a href="hotels.html">Hotels</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="guides.html">Tour Guides</a></li>
                <li><a href="favorites.html">❤️ Favorites</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="admin-login.html" class="admin-link">Admin</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="margin-top: 2rem;">
        <h1 class="section-title">Tourist Sites</h1>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label for="search">Search</label>
                <input type="text" id="search" placeholder="Search sites...">
            </div>
            <div class="filter-group">
                <label for="category">Category</label>
                <select id="category">
                    <option value="">All Categories</option>
                    <option value="beach">Beach</option>
                    <option value="forest">Forest</option>
                    <option value="museum">Museum</option>
                    <option value="monument">Monument</option>
                    <option value="park">Park</option>
                    <option value="waterfall">Waterfall</option>
                    <option value="wildlife">Wildlife</option>
                    <option value="cultural">Cultural</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="city">City</label>
                <input type="text" id="city" placeholder="Enter city name...">
            </div>
        </div>

        <!-- Sites Grid -->
        <div class="sites-grid" id="sites-container">
            <p class="loading">Loading sites...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Tourism Promotion Platform - Ogooué-Maritime Province, Gabon</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/sites.js"></script>
</body>
</html>
